# https://embarkstudios.github.io/cargo-deny

[graph]
all-features = true
targets = ["aarch64-apple-darwin", "wasm32-wasip2"]

[output]
feature-depth = 1

[advisories]
unmaintained = 'workspace'
ignore = [
  # rustls-webpki 0.102.8 CRL distribution-point matching bug.
  # Transitive via wasmtime-wasi-http -> rustls 0.22; fix requires
  # wasmtime to bump to rustls 0.23+ (rustls-webpki 0.103.10+).
  "RUSTSEC-2026-0049",
  # rand 0.8.5 unsoundness with custom logger + thread_rng reseeding.
  # Transitive via wasmtime-wasi (cap-rand) and oauth2; no 0.8.x patch
  # available — fix requires upstream to bump to rand 0.9.3+.
  "RUSTSEC-2026-0097",
]

[licenses]
allow = [
  "Apache-2.0 WITH LLVM-exception",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "MIT-0",
  "Unicode-3.0",
  "Zlib",
]

[licenses.private]
ignore = true

[sources]
allow-git = ["https://github.com/bytecodealliance/wasmtime"]

[bans]
deny = [
  { name = "tokio", deny-multiple-versions = true },
]
multiple-versions = "allow"
skip = []
skip-tree = []
wildcards = "allow"

[bans.workspace-dependencies]
duplicates = "deny"
include-path-dependencies = true
unused = "warn"
