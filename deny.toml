# https://embarkstudios.github.io/cargo-deny

[graph]
all-features = true
targets = ["aarch64-apple-darwin", "wasm32-wasip2"]

[output]
feature-depth = 1

[advisories]
unmaintained = 'workspace'
ignore = [
]

[licenses]
allow = [
  "Apache-2.0 WITH LLVM-exception",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "MIT-0",
  "Unicode-3.0",
  "Zlib",
]

[licenses.private]
ignore = true

[sources]
allow-git = ["https://github.com/bytecodealliance/wasmtime"]

[bans]
deny = [
  { name = "tokio", deny-multiple-versions = true },
]
multiple-versions = "allow"
skip = []
skip-tree = []
wildcards = "allow"

[bans.workspace-dependencies]
duplicates = "deny"
include-path-dependencies = true
unused = "warn"
